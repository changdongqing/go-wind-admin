syntax = "proto3";

package thingmodel.service.v1;

import "gnostic/openapi/v3/annotations.proto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";

import "pagination/v1/pagination.proto";

// 产品发布状态 / Product lifecycle status
enum ProductStatus {
  PRODUCT_STATUS_UNSPECIFIED = 0;
  DRAFT     = 1;  // 草稿（特征结构可改）/ Draft (mutable structure)
  PUBLISHED = 2;  // 已发布（特征结构冻结，仅 override 可调）/ Published (frozen structure)
}

// 产品服务（源领域层，无 HTTP 注解）/ Product service (domain)
//
// 产品 = "可实例化的设备原型"，挂载于 level=4 细类，承载产品物模型。
// 详见 docs/thingmodel/sheji/模型管理/02-数据模型设计.md §2.2
service ProductService {
  // 分页查询（业务过滤通过 PagingRequest.query 传入：category_id/status/manufacturer/keyword/is_enabled）
  rpc List (pagination.PagingRequest) returns (ListProductResponse) {}

  // 统计 / Count
  rpc Count (pagination.PagingRequest) returns (CountProductResponse) {}

  // 查询详情 / Get
  rpc Get (GetProductRequest) returns (Product) {}

  // 创建 / Create
  rpc Create (CreateProductRequest) returns (google.protobuf.Empty) {}

  // 更新（仅 DRAFT 可改结构性字段；PUBLISHED 状态仅 manufacturer/description/sort 等）/ Update
  rpc Update (UpdateProductRequest) returns (google.protobuf.Empty) {}

  // 删除 / Delete
  rpc Delete (DeleteProductRequest) returns (google.protobuf.Empty) {}

  // 发布（DRAFT → PUBLISHED）/ Publish
  rpc Publish (PublishProductRequest) returns (google.protobuf.Empty) {}

  // 撤销发布（PUBLISHED → DRAFT，本期保留接口）/ Unpublish
  rpc Unpublish (UnpublishProductRequest) returns (google.protobuf.Empty) {}
}

// 产品 / Product
message Product {
  optional uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "产品ID / Product ID"}
  ];

  optional string code = 2 [
    json_name = "code",
    (gnostic.openapi.v3.property) = {description: "产品编码（程序标识符，租户内唯一，不可变）/ Product code, immutable"}
  ];

  optional string name = 3 [
    json_name = "name",
    (gnostic.openapi.v3.property) = {description: "产品中文名 / Name (zh)"}
  ];

  optional string name_en = 4 [
    json_name = "nameEn",
    (gnostic.openapi.v3.property) = {description: "产品英文名 / Name (en)"}
  ];

  optional uint32 category_id = 5 [
    json_name = "categoryId",
    (gnostic.openapi.v3.property) = {description: "分类ID（必须 level=4，不可变）/ Category ID, must be level=4"}
  ];

  // ===== 关联只读字段（List/Get 时由后端 join 填充）/ Joined fields =====
  optional string category_code = 10 [
    json_name = "categoryCode",
    (gnostic.openapi.v3.property) = {description: "分类编码（冗余）/ Category code (denormalized)"}
  ];
  optional string category_name = 11 [
    json_name = "categoryName",
    (gnostic.openapi.v3.property) = {description: "分类名（冗余）/ Category name (denormalized)"}
  ];

  // ===== 自有字段 =====
  optional string manufacturer = 20 [
    json_name = "manufacturer",
    (gnostic.openapi.v3.property) = {description: "制造商/品牌（可选）/ Manufacturer (optional)"}
  ];

  optional string model_no = 21 [
    json_name = "modelNo",
    (gnostic.openapi.v3.property) = {description: "型号（可选）/ Model number (optional)"}
  ];

  optional string icon = 22 [
    json_name = "icon",
    (gnostic.openapi.v3.property) = {description: "Iconify 图标名 / Icon"}
  ];

  optional string description = 23 [
    json_name = "description",
    (gnostic.openapi.v3.property) = {description: "描述 / Description"}
  ];

  optional ProductStatus status = 30 [
    json_name = "status",
    (gnostic.openapi.v3.property) = {description: "发布状态 DRAFT/PUBLISHED / Lifecycle status"}
  ];

  optional bool is_enabled = 31 [
    json_name = "isEnabled",
    (gnostic.openapi.v3.property) = {description: "运行启停 / Is enabled"}
  ];

  optional uint32 sort_order = 32 [
    json_name = "sortOrder",
    (gnostic.openapi.v3.property) = {description: "排序号 / Sort order"}
  ];

  optional uint32 reference_count = 33 [
    json_name = "referenceCount",
    (gnostic.openapi.v3.property) = {description: "被设备实例引用次数（预留）/ Reference count (reserved)"}
  ];

  // ===== 统计字段（List 时返回）=====
  optional uint32 feature_count = 40 [
    json_name = "featureCount",
    (gnostic.openapi.v3.property) = {description: "该产品下特征条目总数（统计）/ Feature count under this product"}
  ];

  optional uint32 tenant_id = 100 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID / Tenant ID"}
  ];
  optional string tenant_name = 101 [
    json_name = "tenantName",
    (gnostic.openapi.v3.property) = {description: "租户名称 / Tenant name"}
  ];

  optional uint32 created_by = 200 [json_name = "createdBy", (gnostic.openapi.v3.property) = {description: "创建者 / Created by"}];
  optional uint32 updated_by = 201 [json_name = "updatedBy", (gnostic.openapi.v3.property) = {description: "更新者 / Updated by"}];
  optional uint32 deleted_by = 202 [json_name = "deletedBy", (gnostic.openapi.v3.property) = {description: "删除者 / Deleted by"}];

  optional google.protobuf.Timestamp created_at = 300 [json_name = "createdAt", (gnostic.openapi.v3.property) = {description: "创建时间 / Created at"}];
  optional google.protobuf.Timestamp updated_at = 301 [json_name = "updatedAt", (gnostic.openapi.v3.property) = {description: "更新时间 / Updated at"}];
  optional google.protobuf.Timestamp deleted_at = 302 [json_name = "deletedAt", (gnostic.openapi.v3.property) = {description: "删除时间 / Deleted at"}];
}

message ListProductResponse {
  repeated Product items = 1;
  uint64 total = 2;
}

message CountProductResponse {
  uint64 count = 1;
}

message GetProductRequest {
  oneof query_by {
    uint32 id = 1;
    string code = 2;
  }

  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {description: "视图字段过滤器 / View field mask"}
  ];
}

message CreateProductRequest {
  Product data = 1;
}

message UpdateProductRequest {
  uint32 id = 1;

  Product data = 2;

  google.protobuf.FieldMask update_mask = 3 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {
      description: "要更新的字段列表 / Fields to update",
      example: {yaml: "name,manufacturer,modelNo,description,sortOrder,isEnabled"}
    }
  ];

  optional bool allow_missing = 4 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "若为 true，资源不存在则新增 / Insert when missing"}
  ];
}

message DeleteProductRequest {
  repeated uint32 ids = 1;
}

message PublishProductRequest {
  uint32 id = 1;
}

message UnpublishProductRequest {
  uint32 id = 1;
}
