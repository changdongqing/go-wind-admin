syntax = "proto3";

package thingmodel.service.v1;

import "errors/errors.proto";

// 物模型系统错误定义 / Thing Model system error definitions
enum ThingModelErrorReason {
    option (errors.default_code) = 500;

    // CR-001：废弃的错误码 / Deprecated reasons
    reserved 42013, 42215;
    reserved "CAT_DEFAULT_FEATURE_OVERRIDE_INVALID", "PF_OVERRIDE_INVALID";

    // 400
    BAD_REQUEST = 0 [(errors.code) = 400]; // 错误请求 / Bad request

    // 401
    UNAUTHORIZED = 100 [(errors.code) = 401]; // 未授权 / Unauthorized

    // 402
    PAYMENT_REQUIRED = 200 [(errors.code) = 402]; // 需要支付 / Payment required

    // 403
    FORBIDDEN = 300 [(errors.code) = 403]; // 禁止访问 / Forbidden

    // 404
    NOT_FOUND = 400 [(errors.code) = 404]; // 找不到资源 / Not found

    // 405
    METHOD_NOT_ALLOWED = 500 [(errors.code) = 405]; // 方法不允许 / Method not allowed

    // 406
    NOT_ACCEPTABLE = 600 [(errors.code) = 406]; // 不可接受的请求 / Not acceptable

    // 407
    PROXY_AUTHENTICATION_REQUIRED = 700 [(errors.code) = 407]; // 代理身份验证需要 / Proxy auth required

    // 408
    REQUEST_TIMEOUT = 800 [(errors.code) = 408]; // 请求超时 / Request timeout

    // 409
    CONFLICT = 900 [(errors.code) = 409]; // 冲突 / Conflict

    // 410
    GONE = 1000 [(errors.code) = 410]; // 已删除 / Gone

    // 411
    LENGTH_REQUIRED = 1010 [(errors.code) = 411]; // 需要Content-Length / Length required

    // 412
    PRECONDITION_FAILED = 1020 [(errors.code) = 412]; // 前置条件失败 / Precondition failed

    // 413
    PAYLOAD_TOO_LARGE = 1030 [(errors.code) = 413]; // 负载过大 / Payload too large

    // 414
    URI_TOO_LONG = 1040 [(errors.code) = 414]; // URI过长 / URI too long

    // 415
    UNSUPPORTED_MEDIA_TYPE = 1050 [(errors.code) = 415]; // 不支持的媒体类型 / Unsupported media type

    // 416
    RANGE_NOT_SATISFIABLE = 1060 [(errors.code) = 416]; // 请求范围无法满足 / Range not satisfiable

    // 417
    EXPECTATION_FAILED = 1070 [(errors.code) = 417]; // 期望失败 / Expectation failed

    // 418
    IM_A_TEAPOT = 1080 [(errors.code) = 418]; // 我是茶壶 (RFC 2324) / I'm a teapot

    // 421
    MISDIRECTED_REQUEST = 1090 [(errors.code) = 421]; // 错误的请求 / Misdirected request

    // 422
    UNPROCESSABLE_ENTITY = 1100 [(errors.code) = 422]; // 不可处理的实体 / Unprocessable entity

    // 423
    LOCKED = 1110 [(errors.code) = 423]; // 已锁定 / Locked

    // 424
    FAILED_DEPENDENCY = 1120 [(errors.code) = 424]; // 依赖失败 / Failed dependency

    // 425
    TOO_EARLY = 1130 [(errors.code) = 425]; // 请求过早 / Too early

    // 426
    UPGRADE_REQUIRED = 1140 [(errors.code) = 426]; // 需要升级 / Upgrade required

    // 428
    PRECONDITION_REQUIRED = 1150 [(errors.code) = 428]; // 需要前置条件 / Precondition required

    // 429
    TOO_MANY_REQUESTS = 1160 [(errors.code) = 429]; // 请求过多 / Too many requests

    // 431
    REQUEST_HEADER_FIELDS_TOO_LARGE = 1170 [(errors.code) = 431]; // 请求头字段过大 / Header fields too large

    // 451
    UNAVAILABLE_FOR_LEGAL_REASONS = 1180 [(errors.code) = 451]; // 因法律原因不可用 / Unavailable for legal reasons

    // 500
    INTERNAL_SERVER_ERROR = 2000 [(errors.code) = 500]; // 内部服务器错误 / Internal server error

    // 501
    NOT_IMPLEMENTED = 2100 [(errors.code) = 501]; // 未实现 / Not implemented

    // 502
    BAD_GATEWAY = 2200 [(errors.code) = 502]; // 错误网关 / Bad gateway

    // 503
    SERVICE_UNAVAILABLE = 2300 [(errors.code) = 503]; // 服务不可用 / Service unavailable

    // 504
    GATEWAY_TIMEOUT = 2400 [(errors.code) = 504]; // 网关超时 / Gateway timeout

    // 505
    HTTP_VERSION_NOT_SUPPORTED = 2500 [(errors.code) = 505]; // HTTP版本不支持 / HTTP version not supported

    // 506
    VARIANT_ALSO_NEGOTIATES = 2600 [(errors.code) = 506]; // 变体也协商 / Variant also negotiates

    // 507
    INSUFFICIENT_STORAGE = 2700 [(errors.code) = 507]; // 存储空间不足 / Insufficient storage

    // 508
    LOOP_DETECTED = 2800 [(errors.code) = 508]; // 检测到循环 / Loop detected

    // 510
    NOT_EXTENDED = 2900 [(errors.code) = 510]; // 未扩展 / Not extended

    // 511
    NETWORK_AUTHENTICATION_REQUIRED = 3000 [(errors.code) = 511]; // 需要网络认证 / Network auth required

    // 598
    NETWORK_READ_TIMEOUT_ERROR = 3100 [(errors.code) = 598]; // 网络读取超时 / Network read timeout

    // 599
    NETWORK_CONNECT_TIMEOUT_ERROR = 3200 [(errors.code) = 599]; // 网络连接超时 / Network connect timeout

    // ===== 单位管理业务错误码 / Unit management business reasons =====
    UNIT_NOT_FOUND = 40010 [(errors.code) = 404];                    // 单位不存在 / Unit not found
    UNIT_CATEGORY_NOT_FOUND = 40011 [(errors.code) = 404];           // 物理量分类不存在 / Category not found
    UNIT_DIFFERENT_CATEGORY = 40020 [(errors.code) = 400];           // 源/目标单位不属于同一物理量分类 / Different category
    UNIT_NOT_CONVERTIBLE = 40021 [(errors.code) = 400];              // 单位不可换算 / Not convertible
    UNIT_LOGARITHMIC_NOT_CONVERTIBLE = 40022 [(errors.code) = 400];  // 对数单位不可线性换算 / Logarithmic not convertible
    UNIT_CONDITIONAL_REQUIRES_PARAMS = 40023 [(errors.code) = 400];  // 条件换算缺失外部参数 / Conditional needs params
    UNIT_OVERFLOW = 40024 [(errors.code) = 400];                     // 换算结果溢出/非数值 / Overflow
    UNIT_INVALID_FACTOR = 40030 [(errors.code) = 400];               // 系数异常 / Invalid factor
    UNIT_BASE_FACTOR_INVALID = 40031 [(errors.code) = 400];          // 基准单位系数必须为 1/0 / Base factor invalid
    UNIT_LINEAR_OFFSET_MUST_BE_ZERO = 40032 [(errors.code) = 400];  // 线性单位偏移必须为 0 / Linear offset must be zero
    UNIT_FACTOR_ZERO = 40033 [(errors.code) = 400];                  // 系数不可为 0 / Factor zero
    UNIT_BASE_ALREADY_EXISTS = 40034 [(errors.code) = 409];          // 该分类已存在基准单位 / Base already exists
    UNIT_IN_USE_CANNOT_DELETE = 40040 [(errors.code) = 409];         // 单位被引用，不可删除 / In use cannot delete
    UNIT_CODE_DUPLICATED = 40041 [(errors.code) = 409];              // 单位编码重复 / Unit code duplicated
    UNIT_CATEGORY_CODE_DUPLICATED = 40042 [(errors.code) = 409];     // 分类编码重复 / Category code duplicated

    // ===== 特征管理业务错误码 / Feature management business reasons =====
    FEATURE_NOT_FOUND = 50010 [(errors.code) = 404];                    // 特征不存在 / Feature not found
    FEATURE_TYPE_INVALID = 50011 [(errors.code) = 400];                 // 特征类型非法 / Invalid feature type
    FEATURE_SPEC_INVALID = 50020 [(errors.code) = 400];                 // spec 结构无效 / Invalid spec structure
    FEATURE_SPEC_MISMATCH = 50021 [(errors.code) = 400];                // 特化列与 spec 不一致 / Specialized columns mismatch spec
    FEATURE_ENUM_EMPTY = 50022 [(errors.code) = 400];                   // 枚举类型缺 enumItems / Enum type missing enumItems
    FEATURE_STRUCT_EMPTY = 50023 [(errors.code) = 400];                 // 结构体类型缺 structFields / Struct type missing structFields
    FEATURE_CONSTRAINT_INVALID = 50024 [(errors.code) = 400];           // 约束非法（min>max 等）/ Invalid constraints
    FEATURE_RELATION_TARGET_NOT_FOUND = 50025 [(errors.code) = 404];    // 关系目标特征不存在 / Relation target feature not found
    FEATURE_CODE_DUPLICATED = 50030 [(errors.code) = 409];              // 特征编码重复 / Feature code duplicated
    FEATURE_IDENTIFIER_DUPLICATED = 50031 [(errors.code) = 409];        // 标识符重复 / Identifier duplicated
    FEATURE_IN_USE_CANNOT_DELETE = 50040 [(errors.code) = 409];         // 特征被关系引用，不可删除 / Feature in use by relation cannot delete
    FEATURE_UNIT_REFERENCE_FAIL = 50050 [(errors.code) = 500];          // 维护单位引用计数失败 / Maintain unit reference count failed

    // ===== 分类管理业务错误码 / Category management business reasons =====
    CATEGORY_NOT_FOUND              = 41010 [(errors.code) = 404]; // 分类不存在 / Category not found
    CATEGORY_PARENT_NOT_FOUND       = 41011 [(errors.code) = 404]; // 父分类不存在 / Parent category not found

    CATEGORY_CODE_FORMAT_INVALID    = 41020 [(errors.code) = 400]; // 编码格式不合法（非纯数字）/ Code format invalid (must be digits)
    CATEGORY_CODE_LENGTH_MISMATCH   = 41021 [(errors.code) = 400]; // 编码长度与 level 不匹配 (= level*2) / Code length mismatch (must = level*2)
    CATEGORY_CODE_PREFIX_MISMATCH   = 41022 [(errors.code) = 400]; // 编码必须以父编码为严格前缀且长度 + 2 / Code must be strict prefix of parent + 2 digits

    CATEGORY_LEVEL_INVALID          = 41023 [(errors.code) = 400]; // 层级不在 1..4 范围 / Level out of range 1..4
    CATEGORY_LEVEL_PARENT_MISMATCH  = 41024 [(errors.code) = 400]; // 父分类层级与本层级不匹配 / Parent level mismatch
    CATEGORY_KIND_PARENT_MISMATCH   = 41025 [(errors.code) = 400]; // 父子分类 kind 不一致 / Parent kind mismatch
    CATEGORY_PARENT_REQUIRED        = 41026 [(errors.code) = 400]; // level>1 必须指定父分类 / Parent required for level>1
    CATEGORY_PARENT_FORBIDDEN       = 41027 [(errors.code) = 400]; // level=1 不能指定父分类 / Parent forbidden when level=1

    CATEGORY_HAS_CHILDREN           = 41030 [(errors.code) = 409]; // 存在子分类，不可删除 / Has children, cannot delete
    CATEGORY_IN_USE_CANNOT_DELETE   = 41031 [(errors.code) = 409]; // 被引用，不可删除 / In use, cannot delete
    CATEGORY_CODE_DUPLICATED        = 41040 [(errors.code) = 409]; // 同 (tenant, kind) 下编码重复 / Code duplicated in (tenant, kind)

    CATEGORY_IMMUTABLE_FIELD        = 41050 [(errors.code) = 400]; // 试图修改不可变字段（kind/code/parent_id/level）/ Attempt to modify immutable field

    // ===== 模型管理 - 分类默认模型 / Category default feature =====
    // CR-001：CAT_DEFAULT_FEATURE_OVERRIDE_INVALID(42013) 已废弃，由 FEATURE_SPEC_INVALID 等通用 spec 校验错误码替代
    CAT_DEFAULT_FEATURE_NOT_FOUND          = 42010 [(errors.code) = 404]; // 分类默认模型条目不存在 / Not found
    CAT_DEFAULT_FEATURE_CATEGORY_NOT_LEAF  = 42011 [(errors.code) = 400]; // 仅 level=4 细类可挂默认模型 / Category must be level=4
    CAT_DEFAULT_FEATURE_DUPLICATE          = 42012 [(errors.code) = 409]; // (category, feature) 已存在 / Duplicate (category, feature)
    CAT_DEFAULT_FEATURE_FEATURE_DISABLED   = 42014 [(errors.code) = 400]; // 引用的全局特征已停用 / Referenced feature disabled

    // ===== 模型管理 - 产品 / Product =====
    PRODUCT_NOT_FOUND                = 42110 [(errors.code) = 404]; // 产品不存在 / Product not found
    PRODUCT_CATEGORY_NOT_LEAF        = 42111 [(errors.code) = 400]; // 产品分类必须 level=4 / Category must be level=4
    PRODUCT_CODE_DUPLICATED          = 42112 [(errors.code) = 409]; // (tenant, code) 冲突 / Code duplicated
    PRODUCT_NAME_DUPLICATED          = 42113 [(errors.code) = 409]; // (tenant, category, name) 冲突 / Name duplicated within category
    PRODUCT_IN_USE_CANNOT_DELETE     = 42120 [(errors.code) = 409]; // 被设备实例引用，不可物理删除 / In use cannot delete
    PRODUCT_STATUS_NOT_DRAFT         = 42130 [(errors.code) = 400]; // 当前状态非 DRAFT，不可执行此操作 / Status not DRAFT
    PRODUCT_STATUS_NOT_PUBLISHED     = 42131 [(errors.code) = 400]; // 当前状态非 PUBLISHED / Status not PUBLISHED
    PRODUCT_IMMUTABLE_FIELD          = 42140 [(errors.code) = 400]; // 试图修改不可变字段（code/category_id）/ Immutable field

    // ===== 模型管理 - 产品特征 / Product feature =====
    // CR-001：PF_OVERRIDE_INVALID(42215) 已废弃，由 FEATURE_SPEC_INVALID 等通用 spec 校验错误码替代
    PRODUCT_FEATURE_NOT_FOUND        = 42210 [(errors.code) = 404]; // 产品特征条目不存在 / Not found
    PF_SOURCE_REF_MISMATCH           = 42211 [(errors.code) = 400]; // source 与 ref_feature_id 配合非法 / source/ref mismatch
    PF_DUPLICATE_CODE                = 42212 [(errors.code) = 409]; // (product, code) 冲突 / Code duplicated within product
    PF_DUPLICATE_IDENTIFIER          = 42213 [(errors.code) = 409]; // (product, identifier) 冲突 / Identifier duplicated
    PF_SPEC_TYPE_MISMATCH            = 42214 [(errors.code) = 400]; // spec 与 feature_type 不一致 / Spec/type mismatch
    PF_PRODUCT_PUBLISHED             = 42216 [(errors.code) = 400]; // 产品已发布，结构禁止变更 / Product published, structure frozen
    PF_FEATURE_DISABLED              = 42217 [(errors.code) = 400]; // 引用的全局特征已停用 / Referenced feature disabled
    PF_DEFAULT_VIA_PULL_ONLY         = 42218 [(errors.code) = 400]; // source=DEFAULT 必须通过 PullFromDefault 创建 / DEFAULT must use PullFromDefault
}
