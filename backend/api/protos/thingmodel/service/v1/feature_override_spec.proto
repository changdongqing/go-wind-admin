syntax = "proto3";

package thingmodel.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/wrappers.proto";

import "thingmodel/service/v1/feature.proto";  // 复用 ValueConstraints / UnitRef

// 特征覆写规约（白名单字段）/ Feature override spec (whitelist fields only)
//
// 用于：
//   thingmodel_category_default_features.override_spec —— 分类层覆写
//   thingmodel_product_features.override_spec        —— 产品层覆写
//
// 设计目标：proto schema 即白名单——结构上只允许 6 个字段，
// 杜绝试图通过 wire 传 dataType/accessMode/enumItems 等结构性字段进行覆写。
// 详见 docs/thingmodel/sheji/模型管理/01-架构决策.md §4
message FeatureOverrideSpec {
  // 覆写数值约束（min/max/step），仅 property 有效
  optional ValueConstraints constraints = 1 [
    json_name = "constraints",
    (gnostic.openapi.v3.property) = {description: "覆写数值约束（仅 property）/ Override numeric constraints (property only)"}
  ];

  // 覆写单位引用（含 unitId 时维护 reference_count），仅 property 有效
  optional UnitRef unit = 2 [
    json_name = "unit",
    (gnostic.openapi.v3.property) = {description: "覆写单位引用（仅 property）/ Override unit ref (property only)"}
  ];

  // 覆写默认值（字符串形式，由消费方按 dataType 解析）
  optional string default_value = 3 [
    json_name = "defaultValue",
    (gnostic.openapi.v3.property) = {description: "覆写默认值（按 dataType 解析）/ Override default value"}
  ];

  // 在分类/产品作用域内的展示别名（不修改原 feature.name）
  optional string display_name = 4 [
    json_name = "displayName",
    (gnostic.openapi.v3.property) = {description: "作用域内展示别名 / Display alias within scope"}
  ];

  // 覆写描述/备注
  optional string description = 5 [
    json_name = "description",
    (gnostic.openapi.v3.property) = {description: "覆写描述 / Override description"}
  ];

  // 覆写 required 标记（仅 service.inputParams 子项语义有效）
  optional google.protobuf.BoolValue required = 6 [
    json_name = "required",
    (gnostic.openapi.v3.property) = {description: "覆写 required（service 参数）/ Override required (service params)"}
  ];
}
