syntax = "proto3";

package admin.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

import "pagination/v1/pagination.proto";
import "thingmodel/service/v1/product_feature.proto";

// 产品特征服务（BFF 层 REST）/ Product feature admin service (BFF REST)
//
// 入口②：产品详情页 Tab 化模型编辑器；含 PullFromDefault 核心批量操作
// 详见 docs/thingmodel/sheji/模型管理/03-API与Proto设计.md §3.3
service ProductFeatureService {
  // 分页查询 / List
  rpc List (pagination.PagingRequest) returns (thingmodel.service.v1.ListProductFeatureResponse) {
    option (google.api.http) = {
      get: "/admin/v1/thingmodel/product-features"
    };
  }

  // 详情（CR-001 后：返回单一 spec）/ Get
  rpc Get (thingmodel.service.v1.GetProductFeatureRequest) returns (thingmodel.service.v1.ProductFeature) {
    option (google.api.http) = {
      get: "/admin/v1/thingmodel/product-features/{id}"
    };
  }

  // 创建（source=GLOBAL/LOCAL）/ Create
  rpc Create (thingmodel.service.v1.CreateProductFeatureRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/admin/v1/thingmodel/product-features"
      body: "*"
    };
  }

  // ⭐ 批量从分类默认模型拉取 / Pull from default
  rpc PullFromDefault (thingmodel.service.v1.PullFromDefaultRequest) returns (thingmodel.service.v1.PullFromDefaultResponse) {
    option (google.api.http) = {
      post: "/admin/v1/thingmodel/product-features:pull-from-default"
      body: "*"
    };
  }

  // 从另一产品克隆全部特征（含 LOCAL）/ Clone from another product
  rpc CloneFromProduct (thingmodel.service.v1.CloneFromProductRequest) returns (thingmodel.service.v1.CloneFromProductResponse) {
    option (google.api.http) = {
      post: "/admin/v1/thingmodel/product-features:clone-from"
      body: "*"
    };
  }

  // 更新（仅白名单字段；PUBLISHED 产品禁改结构）/ Update via FieldMask
  rpc Update (thingmodel.service.v1.UpdateProductFeatureRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/admin/v1/thingmodel/product-features/{id}"
      body: "*"
    };
  }

  // 删除（批量）/ Delete
  rpc Delete (thingmodel.service.v1.DeleteProductFeatureRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/admin/v1/thingmodel/product-features"
    };
  }

  // 拖拽排序 / Reorder
  rpc Reorder (thingmodel.service.v1.ReorderProductFeaturesRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/admin/v1/thingmodel/product-features:reorder"
      body: "*"
    };
  }
}
